<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4136"/>
      <stop offset="100%" stop-color="#fbb040"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6ee"/>
      <stop offset="100%" stop-color="#f4e4d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Equalizer bars, upper section -->
  <g transform="translate(540 80) scale(2.1)" fill="url(#barGrad)">
    <rect x="0"     y="0"     width="5.27" height="54.195" rx="2.635"/>
    <rect x="10"    y="11.63" width="5.27" height="42.565" rx="2.635"/>
    <rect x="20"    y="26.44" width="5.27" height="27.755" rx="2.635"/>
    <rect x="30"    y="36.53" width="5.27" height="17.665" rx="2.635"/>
    <rect x="39.94" y="26.44" width="5.27" height="27.755" rx="2.635"/>
    <rect x="49.92" y="11.63" width="5.27" height="42.565" rx="2.635"/>
    <rect x="59.91" y="0"     width="5.27" height="54.195" rx="2.635"/>
  </g>

  <!-- Melo wordmark -->
  <text x="600" y="340" text-anchor="middle"
    font-family="Outfit, -apple-system, sans-serif"
    font-size="140" font-weight="600"
    fill="#1E1E1E" letter-spacing="-2">Melo</text>

  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle"
    font-family="DM Sans, -apple-system, sans-serif"
    font-size="34" font-weight="400"
    fill="#5a5048" letter-spacing="0.5">Where concerts live forever.</text>

  <!-- URL pill at bottom -->
  <rect x="500" y="500" width="200" height="62" rx="31" fill="#ef4136"/>
  <text x="600" y="541" text-anchor="middle"
    font-family="DM Sans, -apple-system, sans-serif"
    font-size="26" font-weight="700"
    fill="#fff" letter-spacing="2">MELO.SHOW</text>
</svg>
