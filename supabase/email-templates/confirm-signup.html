<!--
  Melo — "Confirm signup" email template.

  This file is the source of truth, but Supabase serves email templates
  from dashboard config, NOT from the repo. To apply:

    Supabase Dashboard → Authentication → Email Templates → "Confirm
    signup" → paste the markup below into the Message body.

  Set the Subject line to:   Your Melo verification code
  (the word "code" lets iOS surface the one-time-code autofill chip.)

  {{ .Token }} is the 8-digit OTP the OtpEntry screen expects. We do
  NOT use {{ .ConfirmationURL }} — Melo's signup flow is code-entry,
  not link-click.
-->
<!doctype html>
<html>
  <body style="margin:0;padding:0;background-color:#FAF8F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FAF8F5;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px;background-color:#ffffff;border-radius:20px;overflow:hidden;border:1px solid rgba(61,44,30,0.06);">
            <!-- gradient header -->
            <tr>
              <td style="background:linear-gradient(135deg,#F4A261,#E8573A);padding:32px 32px 28px;text-align:center;">
                <div style="font-size:26px;font-weight:800;color:#ffffff;letter-spacing:-0.02em;">melo</div>
                <div style="font-size:13px;color:rgba(255,255,255,0.85);margin-top:2px;">Where concerts live forever</div>
              </td>
            </tr>
            <!-- body -->
            <tr>
              <td style="padding:32px;">
                <div style="font-size:20px;font-weight:700;color:#3D2C1E;text-align:center;">Confirm your email</div>
                <div style="font-size:15px;color:#6B5A4E;line-height:1.6;text-align:center;margin-top:8px;">
                  Enter this code in the Melo app to finish creating your account.
                </div>
                <!-- the code -->
                <div style="margin:28px 0;text-align:center;">
                  <div style="display:inline-block;background-color:#FAF8F5;border:1.5px solid rgba(232,87,58,0.25);border-radius:14px;padding:18px 28px;font-size:32px;font-weight:800;letter-spacing:0.12em;color:#E8573A;">
                    {{ .Token }}
                  </div>
                </div>
                <div style="font-size:13px;color:#9B8A7E;line-height:1.6;text-align:center;">
                  This code expires in one hour. If you didn't sign up for
                  Melo, you can safely ignore this email.
                </div>
              </td>
            </tr>
            <!-- footer -->
            <tr>
              <td style="padding:0 32px 28px;text-align:center;">
                <div style="border-top:1px solid rgba(61,44,30,0.08);padding-top:18px;font-size:12px;color:#9B8A7E;">
                  Melo · the concert tracker<br />
                  Need help? <a href="mailto:support@melo.app" style="color:#E8573A;text-decoration:none;">support@melo.app</a>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
